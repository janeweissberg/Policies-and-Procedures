
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CDME Policies & Procedures Hub</title>
<style>
  :root{
    --bg:#f6f8fb;
    --panel:#ffffff;
    --border:#d9e0ea;
    --text:#1f2937;
    --muted:#5b6472;
    --accent:#ba0c2f;
    --accent-soft:#fdecef;
    --hover:#f1f5f9;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:"Segoe UI", Arial, sans-serif;
    color:var(--text);
    background:var(--bg);
  }
  .app{
    display:grid;
    grid-template-columns:320px 1fr;
    min-height:100vh;
  }
  .sidebar{
    background:var(--panel);
    border-right:1px solid var(--border);
    padding:20px 16px;
    overflow:auto;
  }
  .brand{
    margin-bottom:18px;
    padding-bottom:14px;
    border-bottom:1px solid var(--border);
  }
  .brand h1{
    font-size:20px;
    margin:0 0 4px 0;
  }
  .brand p{
    margin:0;
    color:var(--muted);
    font-size:13px;
    line-height:1.4;
  }
  .search{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:10px;
    font-size:14px;
    margin-bottom:14px;
  }
  details.group{
    border:1px solid var(--border);
    border-radius:12px;
    background:#fff;
    margin-bottom:10px;
    overflow:hidden;
  }
  details.group summary{
    list-style:none;
    cursor:pointer;
    padding:12px 14px;
    font-weight:600;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#fff;
  }
  details.group summary::-webkit-details-marker{display:none}
  details.group[open] summary{
    background:var(--accent-soft);
    color:var(--accent);
  }
  .items{
    border-top:1px solid var(--border);
    padding:6px;
  }
  .nav-btn{
    width:100%;
    text-align:left;
    border:none;
    background:none;
    border-radius:8px;
    padding:10px 10px;
    cursor:pointer;
    color:var(--text);
    font-size:14px;
    line-height:1.35;
  }
  .nav-btn:hover{background:var(--hover)}
  .nav-btn.active{
    background:var(--accent-soft);
    color:var(--accent);
    font-weight:600;
  }
  .content{
    padding:28px;
  }
  .content-card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    padding:28px;
    max-width:1000px;
    box-shadow:0 8px 24px rgba(15,23,42,.04);
  }
  .eyebrow{
    display:inline-block;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--accent);
    background:var(--accent-soft);
    padding:6px 8px;
    border-radius:999px;
    margin-bottom:14px;
  }
  h2{margin:0 0 8px 0; font-size:30px;}
  .subtitle{
    margin:0 0 18px 0;
    color:var(--muted);
    font-size:15px;
    line-height:1.5;
  }
  h3{margin:22px 0 10px 0; font-size:19px;}
  ol, ul{padding-left:22px; line-height:1.6;}
  li{margin:4px 0}
  .placeholder{
    background:#fafafa;
    border:1px dashed var(--border);
    border-radius:14px;
    padding:16px;
    color:var(--muted);
  }
  .meta{
    margin-top:24px;
    font-size:12px;
    color:var(--muted);
    border-top:1px solid var(--border);
    padding-top:14px;
  }
  @media (max-width:900px){
    .app{grid-template-columns:1fr}
    .sidebar{border-right:none; border-bottom:1px solid var(--border)}
    .content{padding:16px}
    .content-card{padding:20px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>CDME Policies & Procedures</h1>
      <p>Prototype hub for use inside Teams. Left-side categories can be expanded to jump to a policy or procedure.</p>
    </div>

    <input id="searchBox" class="search" type="text" placeholder="Search policies..." oninput="filterNav()" />

    <details class="group" open data-group>
      <summary><span>Intro</span><span>▾</span></summary>
      <div class="items">
        <button class="nav-btn active" data-id="welcome" onclick="showSection('welcome', this)">Welcome / How to Use This Hub</button>
      </div>
    </details>

    <details class="group" open data-group>
      <summary><span>Facility ops</span><span>▾</span></summary>
      <div class="items">
        <button class="nav-btn" data-id="purchase" onclick="showSection('purchase', this)">Equipment – Purchase Process</button>
        <button class="nav-btn" data-id="donation" onclick="showSection('donation', this)">Equipment – Donation Process</button>
        <button class="nav-btn" data-id="consignment" onclick="showSection('consignment', this)">Equipment – Consignment Process</button>
        <button class="nav-btn" data-id="surplus" onclick="showSection('surplus', this)">Equipment – Surplus Process</button>
        <button class="nav-btn" data-id="facilitycontrol" onclick="showSection('facilitycontrol', this)">Facility Control Procedure</button>
        <button class="nav-btn" data-id="ehs" onclick="showSection('ehs', this)">Environmental Health and Safety</button>
        <button class="nav-btn" data-id="visitorparking" onclick="showSection('visitorparking', this)">Visitor Parking Permit</button>
        <button class="nav-btn" data-id="shipping" onclick="showSection('shipping', this)">Shipping and Receiving Procedure</button>
        <button class="nav-btn" data-id="businesshours" onclick="showSection('businesshours', this)">Standard Business Hours</button>
        <button class="nav-btn" data-id="pandemictraining" onclick="showSection('pandemictraining', this)">Pandemic One-on-One Training</button>
      </div>
    </details>

    <details class="group" open data-group>
      <summary><span>Salesforce</span><span>▾</span></summary>
      <div class="items">
        <button class="nav-btn" data-id="salesforce" onclick="showSection('salesforce', this)">Salesforce Operating Procedures</button>
        <button class="nav-btn" data-id="crm" onclick="showSection('crm', this)">Customer Relationship Management</button>
      </div>
    </details>

    <details class="group" open data-group>
      <summary><span>General ops</span><span>▾</span></summary>
      <div class="items">
        <button class="nav-btn" data-id="drivers" onclick="showSection('drivers', this)">OSU Drivers Registration</button>
        <button class="nav-btn" data-id="travel" onclick="showSection('travel', this)">Work Related Travel</button>
        <button class="nav-btn" data-id="information" onclick="showSection('information', this)">Information Management</button>
        <button class="nav-btn" data-id="dcn" onclick="showSection('dcn', this)">DCN File and Document Numbering</button>
        <button class="nav-btn" data-id="inventions" onclick="showSection('inventions', this)">Invention Disclosure Process</button>
        <button class="nav-btn" data-id="decisionmatrix" onclick="showSection('decisionmatrix', this)">Project Contract Vehicle Decision Matrix</button>
        <button class="nav-btn" data-id="sponsoredguest" onclick="showSection('sponsoredguest', this)">Sponsored Guest</button>
        <button class="nav-btn" data-id="marketing" onclick="showSection('marketing', this)">Marketing</button>
      </div>
    </details>

    <details class="group" open data-group>
      <summary><span>Human Resources</span><span>▾</span></summary>
      <div class="items">
        <button class="nav-btn" data-id="newassociate" onclick="showSection('newassociate', this)">New Associate Onboarding</button>
        <button class="nav-btn" data-id="dresscode" onclick="showSection('dresscode', this)">Dress Code</button>
        <button class="nav-btn" data-id="studenthandbook" onclick="showSection('studenthandbook', this)">Student Employee Handbook</button>
        <button class="nav-btn" data-id="staffhiring" onclick="showSection('staffhiring', this)">Staff Employment – Hiring Process</button>
        <button class="nav-btn" data-id="studenthiring" onclick="showSection('studenthiring', this)">Student Employment – Hiring Process</button>
        <button class="nav-btn" data-id="studentonboarding" onclick="showSection('studentonboarding', this)">Student Employment – Onboarding, Promotions, and Offboarding</button>
      </div>
    </details>
  </aside>

  <main class="content">
    <div class="content-card" id="content"></div>
  </main>
</div>

<script>
const sections = {
  welcome: `
    <div class="eyebrow">Intro</div>
    <h2>Welcome / How to Use This Hub</h2>

    <ul>
      <li><strong>Intro</strong> contains overview and orientation material.</li>
      <li><strong>Facility ops</strong> contains equipment, facility access, safety, and building-related procedures.</li>
      <li><strong>Salesforce</strong> contains CRM procedures and stage guidance.</li>
      <li><strong>General ops</strong> contains shared operational procedures, document controls, travel, and contracting guidance.</li>
      <li><strong>Human Resources</strong> contains onboarding, hiring, handbook, and employment-related procedures.</li>
    </ul>

  `,
  purchase: `
    <div class="eyebrow">Facility ops</div>
    <h2>Equipment – Purchase Process</h2>
    <p class="subtitle">Used when CDME staff are purchasing equipment with CDME funds.</p>

    <h3>Overview</h3>
    <p>Equipment is central to CDME operations. This process should be followed when purchasing equipment with CDME funds.</p>

    <h3>Required approvals before purchase</h3>
    <ol>
      <li><strong>Division Director</strong> (if applicable) confirms the equipment aligns with division goals and objectives.</li>
      <li><strong>Director of Laboratory Services</strong> confirms space, power, and any facility upgrade needs.</li>
      <li><strong>Director of Business Administration</strong> confirms funding is available for the purchase, delivery, and facility upgrades and confirms forecasted project work tied to the equipment.</li>
      <li><strong>Executive Director</strong> confirms alignment with CDME’s mission and vision.</li>
    </ol>

    <h3>Process steps</h3>
    <ol>
      <li>CDME staff member obtains approval from all leadership listed above.</li>
      <li>CDME staff member works with the CDME Fiscal Associate to initiate the purchase and follow university purchasing procedures.</li>
      <li>CDME staff member coordinates delivery and any needed facility upgrades with the Director of Laboratory Services and Director of Business Administration.</li>
      <li>Director of Laboratory Services documents the equipment on CDME master equipment lists.</li>
    </ol>

    <div class="meta">Source document: Equipment – Purchase Process</div>
  `,
  donation: `
    <div class="eyebrow">Facility ops</div>
    <h2>Equipment – Donation Process</h2>
    <p class="subtitle">Used when equipment is being donated to CDME by an external partner.</p>

    <h3>Overview</h3>
    <p>Many CDME equipment additions come through donation. This process ensures the donation is properly approved and documented within OSU/CDME.</p>

    <h3>Required approvals before donation</h3>
    <ol>
      <li><strong>Division Director</strong> (if applicable) confirms alignment with division goals.</li>
      <li><strong>Director of Laboratory Services</strong> confirms space, power, and facility readiness.</li>
      <li><strong>Director of Business Administration</strong> confirms funding for delivery and upgrades and confirms forecasted project use.</li>
      <li><strong>Executive Director</strong> confirms alignment with CDME’s overall mission and vision.</li>
    </ol>

    <h3>Process steps</h3>
    <ol>
      <li>CDME staff member obtains all required leadership approvals.</li>
      <li>CDME staff member works with the appropriate College of Engineering or OSU Office of Advancement staff to complete and document the donation paperwork.</li>
      <li>CDME staff member coordinates delivery and facility upgrades with the Director of Laboratory Services and Director of Business Administration.</li>
      <li>Director of Laboratory Services adds the donated equipment to CDME master equipment lists.</li>
    </ol>

    <div class="meta">Source document: Equipment – Donation Process</div>
  `,
  consignment: `
    <div class="eyebrow">Facility ops</div>
    <h2>Equipment – Consignment Process</h2>
    <p class="subtitle">Used when external partners offer equipment to CDME under a consignment agreement.</p>

    <h3>Overview</h3>
    <p>This process should be followed to ensure consigned equipment is received and documented correctly within OSU/CDME.</p>

    <h3>Required approvals before consignment</h3>
    <ol>
      <li><strong>Division Director</strong> (if applicable) confirms alignment with division goals.</li>
      <li><strong>Director of Laboratory Services</strong> confirms facility capacity and upgrade needs.</li>
      <li><strong>Director of Business Administration</strong> confirms funding for delivery, maintenance, and facility upgrades and confirms forecasted project work.</li>
      <li><strong>Executive Director</strong> confirms alignment with CDME mission and vision.</li>
    </ol>

    <h3>Process steps</h3>
    <ol>
      <li>CDME staff member obtains the required approvals.</li>
      <li>CDME staff member works with the Engineering Research Administration Contracts Manager and, if needed, OSU Legal Affairs to complete consignment paperwork with the external partner.</li>
      <li>CDME staff member coordinates delivery and any needed upgrades with the Director of Laboratory Services and Director of Business Administration.</li>
      <li>Director of Laboratory Services documents the equipment on CDME master equipment lists and includes beginning and end dates for the consignment.</li>
    </ol>

    <div class="meta">Source document: Equipment – Consignment Process</div>
  `,
  surplus: `
    <div class="eyebrow">Facility ops</div>
    <h2>Equipment – Surplus Process</h2>
    <p class="subtitle">Used when CDME equipment is being removed or otherwise disposed of through OSU Surplus.</p>

    <h3>Overview</h3>
    <p>OSU Surplus handles the disposition of Ohio State property in accordance with university policy. Disposition methods can include department transfer, public sale, public auction, recycle, and trash.</p>

    <h3>Process steps</h3>
    <ol>
      <li>CDME staff confirms ownership of the equipment with the Director of Laboratory Services before moving forward.</li>
      <li>If the equipment belongs to a non-CDME faculty or staff member, permission from the owner must be received before disposition.</li>
      <li>Director of Laboratory Services emails the Fiscal Associate the equipment name, location, OSU Asset ID if applicable, picture, disposition instructions, and CDME point of contact including phone number.</li>
      <li>Fiscal Associate submits a Disposal Request through the OSU Surplus Property Management System (SPMS).</li>
      <li>Director of Business Administration reviews and approves the Disposal Request in SPMS.</li>
      <li>The CDME point of contact coordinates pick-up with OSU Surplus.</li>
      <li>If sold or auctioned, CDME may receive a percentage of the sale depending on OSU Surplus policy at that time; this should be confirmed before removal.</li>
      <li>Director of Laboratory Services removes the equipment from CDME master equipment lists.</li>
    </ol>

    <div class="meta">Source document: Equipment – Surplus Process</div>
  `,
  facilitycontrol: `
    <div class="eyebrow">Facility ops</div>
    <h2>Facility Control Procedure</h2>
    <p class="subtitle">Defines non-negotiable access and security controls for CDME’s ITAR/EAR-compliant facility.</p>

    <h3>Purpose and scope</h3>
    <p>CDME is an ITAR and Export Administration Regulations compliant facility. Because much of the work does not qualify as fundamental research, export-controlled materials, equipment, processes, and generated work product are subject to strict facility and data controls.</p>

    <h3>Physical security plan</h3>
    <ul>
      <li>Employees approved for unrestricted work inside CDME receive key card access to restricted areas.</li>
      <li>BuckIDs and brass keys may not be loaned to another person and lost credentials must be reported immediately.</li>
      <li>All non-CDME personnel are treated as visitors and must sign in before entering restricted space.</li>
    </ul>

    <h3>Visitor and entrance procedure</h3>
    <ol>
      <li>Visitors must list name, affiliation, and all countries of citizenship on the visitor log.</li>
      <li>Any visitor who refuses to complete the log may not enter restricted space.</li>
      <li>All visitors must be escorted in restricted space at all times.</li>
      <li>Foreign visitors must be verified in Visual Compliance before admission; if a match appears, entry requires Office of Compliance approval.</li>
      <li>Visitor logs must be retained and submitted to the Office of Compliance quarterly.</li>
    </ol>

    <h3>Additional control rules</h3>
    <ul>
      <li>Export-controlled items may not leave restricted space without prior authorization from the Office of Compliance.</li>
      <li>Maintenance, janitorial, and repair personnel must be U.S. persons.</li>
      <li>IT closet/server access is limited to U.S. persons and granted only on a necessity basis.</li>
      <li>Technical data includes sponsor-provided export-controlled data and non-public project data such as drawings, reports, invention reports, and presentations.</li>
    </ul>

    <div class="meta">Source document: 7009B – Facility Control Procedure</div>
  `,
  ehs: `
    <div class="eyebrow">Facility ops</div>
    <h2>Environmental Health and Safety</h2>
    <p class="subtitle">Establishes CDME safety responsibilities, required training, and equipment-specific competency requirements.</p>

    <h3>Environmental Health & Safety requirements</h3>
    <ul>
      <li>CDME leadership must provide a safe work environment and maintain training records.</li>
      <li>Faculty, staff, and students must complete required safety training and report unsafe conditions or accidents.</li>
      <li>Any chemical or hazardous material brought on-site must include a Safety Data Sheet for the Environmental Safety Officer.</li>
      <li>Research engineers must have a Standard Operating Procedure, documented training, and a Job Hazard Analysis before project work begins.</li>
    </ul>

    <h3>Training</h3>
    <ol>
      <li>All new staff attend EHS new staff orientation before accessing the floor or joining projects.</li>
      <li>All new students complete the CDME online training package.</li>
      <li>Users must set up an account in the EHS/OHS system and be assigned to the CDME group policy before participating in high-hazard work.</li>
      <li>Before operating any equipment or machinery, staff must have documented SOP and JHA training.</li>
    </ol>

    <h3>Additional required training</h3>
    <ul>
      <li>All CDME employees must complete the “Securing the Human – Office of Research” course in Carmen.</li>
      <li>Crane operators need an overhead crane operators course, knowledge assessment, and hands-on competency training every 5 years.</li>
      <li>Forklift users need competency training, knowledge assessment, and pre-operation startup training every 3 years.</li>
      <li>Paper copies of EHS policies are located on the high bay floor and on the CDME g-drive.</li>
    </ul>

    <div class="meta">Source document: 7004B – Environmental Health and Safety</div>
  `,
  visitorparking: `
    <div class="eyebrow">Facility ops</div>
    <h2>Visitor Parking Permit</h2>
    <p class="subtitle">Explains how to handle short-term parking and electronic visitor permit registration for CDME guests.</p>

    <h3>Overview</h3>
    <ul>
      <li>If a visitor will be on site for 20 minutes or less, they may park in the loading/unloading zone near the main entrance.</li>
      <li>If the visit is longer than 20 minutes, they need a parking pass and may not remain in the loading/unloading zone.</li>
      <li>CDME has a 10-minute grace period to complete electronic permit registration after the visitor arrives.</li>
    </ul>

    <h3>Visitor permit process</h3>
    <ol>
      <li>Log in to the CDME ParkMobile account.</li>
      <li>Select <strong>Start Parking</strong>.</li>
      <li>Select the <strong>Visitor</strong> tab.</li>
      <li>Enter the visitor’s name and company.</li>
      <li>Enter CDME’s zone number.</li>
      <li>Select the expected duration and finalize the parking pass through the prompts.</li>
    </ol>

    <h3>Important note</h3>
    <p>The permit should be completed as soon as the visitor arrives so any initial ticket can be waived under the agreed grace-period process.</p>

    <div class="meta">Source document: 7005B – Visitor Parking Permit</div>
  `,
  shipping: `
    <div class="eyebrow">Facility ops</div>
    <h2>Shipping and Receiving Procedure</h2>
    <p class="subtitle">Covers outbound shipping responsibilities, receiving inspections, shortage/damage handling, and freight claims.</p>

    <h3>Shipping responsibilities</h3>
    <ul>
      <li>Prepare packages to prevent damage and follow carrier or NMFC packaging guidance.</li>
      <li>If using pallets, stack cartons squarely with no overhang and secure them properly.</li>
      <li>Shipper and consignee information must match the Bill of Lading exactly.</li>
      <li>Hazardous materials must be labeled appropriately and disclosed to the carrier.</li>
      <li>Arrange pickup either through a carrier directly or OSU Shipping and Receiving.</li>
      <li>For expensive or unique shipments, take a photo before freight leaves CDME.</li>
      <li>Obtain tracking or PRO numbers as soon as possible.</li>
    </ul>

    <h3>Receiving responsibilities</h3>
    <ol>
      <li>Check for visible damage such as punctures, wet boxes, torn wrap, or tilt/shock indicators.</li>
      <li>Open suspicious shipments while the driver is present.</li>
      <li>Document exact damage or shortages on both delivery receipts and have the driver sign them.</li>
      <li>For concealed damage, notify the carrier immediately in writing and preserve the shipment in its discovered condition.</li>
      <li>For shortages, count handling units carefully and note shortages in exact terms on the delivery receipt.</li>
    </ol>

    <h3>Important time limits and claims</h3>
    <ul>
      <li>Concealed damage should be reported as soon as possible and ideally within 5 days of delivery.</li>
      <li>Most bills of lading require the carrier to receive a formal claim within 9 months.</li>
      <li>Claims may be filed by the shipper, consignee, or another party with title to the goods.</li>
      <li>Claim packages generally need a claim statement, bill of lading or delivery receipt, damage documentation, invoices, and photos.</li>
    </ul>

    <div class="meta">Source document: 7011A – Shipping and Receiving Procedure</div>
  `,
  businesshours: `
    <div class="eyebrow">Facility ops</div>
    <h2>Standard Business Hours</h2>
    <p class="subtitle">Defines CDME facility access rules and the expected core daytime hours for staff availability.</p>

    <h3>Facility hours</h3>
    <p>CDME’s facility is open 24 hours per day, 7 days per week to employees. Staff and students may work unaccompanied in offices and conference rooms, but no one is authorized to work in the laboratory outside standard business hours without another person present.</p>

    <h3>Standard business hours</h3>
    <p>Because CDME’s primary customer base is in the Midwest, standard business hours are <strong>9:00 a.m. to 3:00 p.m.</strong> Staff should work with their supervisor to develop an agreed schedule that supports customer and vendor needs.</p>

    <h3>Flexible scheduling</h3>
    <p>If a traditional 8-hour day is not the right fit, the supervisor and staff member may arrange and document a flexible work schedule in accordance with OSU’s flexible work policy.</p>

    <div class="meta">Source document: 7012A – Standard Business Hours</div>
  `,
  pandemictraining: `
    <div class="eyebrow">Facility ops</div>
    <h2>Pandemic One-on-One Training</h2>
    <p class="subtitle">Guidance for equipment training that must be done in person during pandemic periods with social distancing controls in place.</p>

    <h3>Background</h3>
    <p>Some large or dangerous pieces of equipment cannot be trained effectively through remote tools alone. This procedure provides guidance for one-on-one hands-on training when traditional tele-training is not enough.</p>

    <h3>Preconditions</h3>
    <ul>
      <li>The trainee must have completed all required CDME training assigned through BuckeyeLearn.</li>
      <li>The trainee must have reviewed CDME policies and procedures posted on the intranet before face-to-face training begins.</li>
    </ul>

    <h3>Procedure</h3>
    <ol>
      <li>Wash hands frequently with soap/water or sanitizer, especially on entry and exit from the labs.</li>
      <li>Face shields should be worn by both trainer and trainee during one-on-one training.</li>
      <li>Training should be pre-planned and rehearsed to minimize face-to-face time.</li>
      <li>All tools and work surfaces should be cleaned using university-approved surface cleaner.</li>
    </ol>

    <div class="meta">Source document: 7015A – Pandemic One-on-One Training Procedure</div>
  `,
  salesforce: `
    <div class="eyebrow">Salesforce</div>
    <h2>Salesforce Operating Procedures</h2>
    <p class="subtitle">CRM guidance for access, records, opportunity management, projects, and email logging.</p>

    <h3>Access / login</h3>
    <ol>
      <li>Contact the CDME Director of Business Administration to request a Salesforce license.</li>
      <li>Use the link provided by Salesforce or a CDME Salesforce administrator to access CDME’s Salesforce domain and complete multifactor authentication.</li>
    </ol>

    <h3>Core data structure</h3>
    <ul>
      <li><strong>Accounts</strong> = the company or organization.</li>
      <li><strong>Contacts</strong> = people associated with an account.</li>
      <li><strong>Opportunities</strong> = potential funded projects still in the sales process.</li>
      <li><strong>Projects</strong> = active or completed work created from Closed Won opportunities.</li>
      <li><strong>Reports / Dashboards</strong> = filtered data and visualizations.</li>
      <li><strong>Folderize</strong> = custom document management system for templates and related files.</li>
    </ul>

    <h3>Key operating rules</h3>
    <ol>
      <li>Search first before entering anything new.</li>
      <li>Data integrity matters: incorrect information affects everyone using the system.</li>
      <li>Create a new Contact from the Account screen whenever possible.</li>
      <li>Create a new Opportunity from the Contact screen whenever possible.</li>
      <li>Do not overwrite existing reports.</li>
    </ol>

    <h3>Opportunity stages</h3>
    <ul>
      <li>Blind RFP / Gov’t</li>
      <li>Prospecting</li>
      <li>Needs Identified</li>
      <li>Verbal Approval</li>
      <li>Proposal / Quote</li>
      <li>Closed Won</li>
      <li>Closed Lost</li>
    </ul>

function showSection(id, el){
  document.getElementById('content').innerHTML = sections[id] || '<p>Section not found.</p>';
  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
  if(el){ el.classList.add('active'); }
}

function filterNav(){
  const q = document.getElementById('searchBox').value.toLowerCase().trim();
  const groups = document.querySelectorAll('[data-group]');
  groups.forEach(group => {
    let visibleCount = 0;
    const buttons = group.querySelectorAll('.nav-btn');
    buttons.forEach(btn => {
      const match = btn.textContent.toLowerCase().includes(q);
      btn.style.display = match ? 'block' : 'none';
      if(match) visibleCount++;
    });
    group.style.display = visibleCount > 0 ? 'block' : 'none';
    if(q && visibleCount > 0){ group.open = true; }
  });
}

document.getElementById('content').innerHTML = sections.welcome;
</script>
